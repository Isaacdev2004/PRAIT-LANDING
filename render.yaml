services:
  - type: web
    name: prait-landing
    runtime: node
    plan: free
    region: ohio
    buildCommand: chmod +x scripts/render-build.sh && ./scripts/render-build.sh
    startCommand: NODE_ENV=production pnpm run start:render
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
